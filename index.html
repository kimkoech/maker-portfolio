<!DOCTYPE HTML>
<!--
	Minimal hello page — same theme as index, fade-in only.
-->
<html>
	<head>
		<title>Hello · Billy Koech</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/custom.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload homepage hello-page">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Banner -->
					<section id="banner" class="major">
						<div class="inner">
							<header class="major">
								<h1><span id="typed1"></span><span class="cursor" id="cursor1" aria-hidden="true"></span></h1>
							</header>
							<div class="content">
								<p><span id="typed2"></span><span class="cursor" id="cursor2" aria-hidden="true"></span></p>
								<p><span id="typed3"></span><span class="cursor" id="cursor3" aria-hidden="true"></span></p>
							</div>
						</div>
					</section>

			</div>

		<!-- Scripts — vanilla preload only (no Forty/jQuery stack on this page) -->
			<script>
				(function() {
					window.addEventListener('load', function() {
						window.setTimeout(function() {
							document.body.classList.remove('is-preload');
						}, 100);
					});
				})();
			</script>
			<script>
				(function() {
					var line1 = "Thoughtful systems at the intersection of hardware, software, and people.";
					var line2 = "Hello, I am Billy. I spends a lot of time thinking about how technology shapes the future.";
					var line3 = "Today's question: What comes after LLMs, agents, and physical AI? Is a digital organism truly possible?";
					var delay = 45;
					var cursor1 = document.getElementById("cursor1");
					var cursor2 = document.getElementById("cursor2");
					var cursor3 = document.getElementById("cursor3");
					var typed1 = document.getElementById("typed1");
					var typed2 = document.getElementById("typed2");
					var typed3 = document.getElementById("typed3");
					if (!cursor2 || !typed1 || !typed2 || !cursor3 || !typed3) return;
					cursor2.style.visibility = "hidden";
					cursor3.style.visibility = "hidden";
					function typeLine(el, text, onDone) {
						var i = 0;
						function step() {
							if (i < text.length) {
								el.appendChild(document.createTextNode(text[i]));
								i++;
								setTimeout(step, delay);
							} else if (onDone) onDone();
						}
						step();
					}
					function startTyping() {
						typeLine(typed1, line1, function() {
							if (cursor1) cursor1.style.visibility = "hidden";
							if (cursor2) cursor2.style.visibility = "visible";
							typeLine(typed2, line2, function() {
								if (cursor2) cursor2.style.visibility = "hidden";
								if (cursor3) cursor3.style.visibility = "visible";
								typeLine(typed3, line3, function() { /* leave cursor3 visible so it keeps blinking */ });
							});
						});
					}
					if (document.readyState === "loading") {
						document.addEventListener("DOMContentLoaded", function() {
							setTimeout(startTyping, 800);
						});
					} else {
						setTimeout(startTyping, 800);
					}
				})();
			</script>

	</body>
</html>
